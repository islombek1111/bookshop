<style>
:root{
  --night-d:#3a2522;      /* warm header/footer */
  --night:#4a2f2a;
  --night-l:#6b4640;

  --white:#ffffff;
  --gold:#d9b36b;
  --gold-l:#f0d29a;
  --terra:#c0624a;        /* modern accent */

  --warm1:#f7efe6;
  --warm2:#eeddd0;
  --ink:#1a0f07;
  --muted:#7a6655;
  --silver:#a09080;
  --border:#e0d0c0;

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;line-height:1.7;overflow-x:hidden;}

/* LOGO */

.logo-text .eyes{display:inline-block;animation:blink 3s infinite;font-style:normal;line-height:1;font-size:1.2rem;margin:0 1px;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.15);}}

header{background:var(--night-d);color:var(--white);padding:0 5vw;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,15,40,.4);}

.curr-btn.active{background:var(--gold);color:var(--night-d);font-weight:500;}

/* HERO - warmer gradient */

.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.035) 1px,transparent 0);background-size:38px 38px;pointer-events:none;}

.hero-text{animation:fadeUp .8s ease both;position:relative;z-index:1;}

h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4vw,3.5rem);line-height:1.12;margin-bottom:20px;color:var(--white);}

.stat-n{font-family:'Playfair Display',serif;font-size:1.85rem;color:var(--gold);line-height:1;}

<script>
// ════════════════════════════════
//  CONFIG & HELPERS
// ════════════════════════════════
const GENRES = {fiction:'Fiction', nonfiction:'Non-Fiction', academic:'Academic', other:'Other'};
const RATES = {UZS:1, USD:0.000079, EUR:0.000073, HUF:0.029};
const SYMBOLS = {UZS:'UZS', USD:'$', EUR:'€', HUF:'Ft'};
const DEF_PASS = 'admin123';

let activeCurrency = 'HUF';
let allBooks = [];
let currentFilter = 'all';
let currentPhoto = null;   // {data: base64}

const ls = (k,v) => v===undefined ? localStorage.getItem(k)||'' : localStorage.setItem(k,String(v));
const getPass = () => {
  const p = localStorage.getItem('bc_pass');
  return (p && p.length>=4) ? p : DEF_PASS;
};
const getSheetUrl = () => ls('bc_sheetUrl');

function convertPrice(uzs){ return Math.round(parseInt(uzs||0)*RATES[activeCurrency]).toLocaleString(); }
function sym(){ return SYMBOLS[activeCurrency]; }

// ════════════════════════════════
//  CURRENCY
// ════════════════════════════════
function setCurrency(c,btn){
  activeCurrency = c;
  document.querySelectorAll('.curr-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('statCurr').textContent = c;
  renderBooks();
}

// ════════════════════════════════
//  GOOGLE SHEETS - robust fetch (no CORS issues)
// ════════════════════════════════
async function fetchBooks(){
  const cached = localStorage.getItem('bc_cache');
  if(cached){
    try{ allBooks = JSON.parse(cached); updateCount(); renderBooks(); }catch(e){}
  }

  const url = getSheetUrl();
  if(!url) return;

  try{
    const res = await fetch(url + '?action=getBooks', {
      method: 'GET',
      redirect: 'follow',
      cache: 'no-store'
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if(data.books){
      allBooks = data.books;
      localStorage.setItem('bc_cache', JSON.stringify(allBooks));
      updateCount();
      renderBooks();
    }
  }catch(e){
    console.warn('Sheet unreachable, using cache', e);
  }
}

function updateCount(){
  document.getElementById('statCount').textContent = allBooks.filter(b=>!b.sold).length;
}

// Push / Update / Delete
async function pushToSheet(book){
  const url = getSheetUrl();
  if(!url) throw new Error('No sheet URL');
  const action = book.id ? 'update' : 'add';
  const data = encodeURIComponent(JSON.stringify(book));
  const res = await fetch(`${url}?action=${action}&data=${data}`, {
    method: 'GET',
    redirect: 'follow',
    cache: 'no-store'
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function deleteFromSheet(id){
  const url = getSheetUrl();
  if(!url) throw new Error('No sheet URL');
  const res = await fetch(`${url}?action=delete&id=${id}`, {
    method: 'GET',
    redirect: 'follow',
    cache: 'no-store'
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ════════════════════════════════
//  PHOTO (single compressed photo)
// ════════════════════════════════
function handlePhoto(input){
  const file = input.files[0];
  if(!file) return;
  document.getElementById('compressNote').textContent = 'Compressing…';
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 600;
      let w = img.width, h = img.height;
      if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed = canvas.toDataURL('image/jpeg', 0.75);
      currentPhoto = {data: compressed};
      document.getElementById('compressNote').textContent = `✓ Ready (${Math.round(compressed.length*0.75/1024)} KB)`;
      document.getElementById('photoPreview').innerHTML = 
        `<div class="photo-thumb"><img src="${compressed}" alt=""/><button class="rm" onclick="removePhoto()">✕</button></div>`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function removePhoto(){
  currentPhoto = null;
  document.getElementById('photoPreview').innerHTML = '';
  document.getElementById('compressNote').textContent = '';
}

function jumpToFilter(genre){

function filterBooks(f,btn){
  currentFilter = f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBooks();
}

function renderBooks(){
  let list = allBooks.filter(b=>{
    if(currentFilter==='all') return true;
    if(currentFilter==='new') return b.condition==='new';
    if(currentFilter==='used') return b.condition==='used';
    if(currentFilter==='discount') return parseInt(b.discount||0)>0;
    return b.genre===currentFilter;
  });

  const grid = document.getElementById('booksGrid');

  if(!getSheetUrl() && allBooks.length===0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔗</div><p><strong>Not connected yet.</strong><br/>Open admin (⚙️) → Settings → connect Google Sheet.</p></div>`;
    return;
  }
  if(!list.length){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>No books match this filter.</p></div>`;
    return;
  }

  grid.innerHTML = list.map((b,i)=>{
    const disc = parseInt(b.discount||0);
    const orig = parseInt(b.price||0);
    const fin = disc>0 ? Math.round(orig*(1-disc/100)) : orig;
    const s = sym();
    const photoUrl = b.photos && b.photos[0] ? b.photos[0] : null;
    const photoHtml = photoUrl 
      ? `<img src="${photoUrl}" alt="${b.title}"/>`
      : `<div class="no-photo-book" style="background:${b.color||'#5c3a1e'}">${b.title}</div>`;
    const ribbon = disc>0 ? `<div class="disc-ribbon">-${disc}% OFF</div>` : '';
    const priceBlock = disc>0
      ? `<div class="orig-price">${convertPrice(orig)} ${s}</div><div class="book-price">${convertPrice(fin)} <span>${s}</span></div>`
      : `<div class="book-price">${convertPrice(fin)} <span>${s}</span></div>`;
    const action = b.sold ? `<span class="sold-lbl">✓ Sold</span>` : `<button class="buy-btn" onclick='openBuyModal(${JSON.stringify(b).replace(/'/g,"&#39;")})'>I want this</button>`;

    return `<div class="book-card" style="animation:fadeUp .5s ${i*0.06}s both">
      <div class="book-photo">${photoHtml}<span class="badge ${b.condition==='new'?'badge-new':'badge-used'}">${b.condition==='new'?'New':'Pre-loved'}</span>${ribbon}</div>
      <div class="book-info">
        <div class="book-genre">${GENRES[b.genre]||b.genre}</div>
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        ${b.condNote?`<div class="book-cond">📋 ${b.condNote}</div>`:''}
        <div class="book-footer"><div>${priceBlock}</div>${action}</div>
      </div>
    </div>`;
  }).join('');
}

async function saveBook(){
  const id = document.getElementById('editId').value;
  const title = document.getElementById('aTitle').value.trim();
  const author = document.getElementById('aAuthor').value.trim();
  const genre = document.getElementById('aGenre').value;
  const condition = document.getElementById('aCondition').value;
  const condNote = document.getElementById('aCondNote').value.trim();
  const price = document.getElementById('aPrice').value.trim();
  const discount = document.getElementById('aDiscount').value.trim() || '0';
  const color = document.getElementById('aColor').value;

  if(!title||!author||!price){ showToast('Title, author and price required','error'); return; }

  // Photos array for backend compatibility
  let photos = currentPhoto ? [currentPhoto.data] : [];
  if(!currentPhoto && id){
    const existing = allBooks.find(b=>b.id===id);
    if(existing && existing.photos) photos = existing.photos;
  }

  const book = {
    id: id || Date.now().toString(),
    title, author, genre, condition, condNote, price, discount, color,
    photos,
    sold: false,
    added: new Date().toISOString()
  };

  showToast('Saving to sheet...');
  const url = getSheetUrl();
  if(url){
    try{
      const result = await pushToSheet(book);
      showToast(id ? 'Book updated ✓' : 'Book added ✓','success');
    }catch(e){
      showToast('Sheet unreachable — saved locally','error');
      saveLocally(book, !!id);
    }
  } else {
    saveLocally(book, !!id);
    showToast(id ? 'Updated locally ✓' : 'Added locally ✓','success');
  }

  clearForm();
  await fetchBooks();
  renderAdminList();
}
